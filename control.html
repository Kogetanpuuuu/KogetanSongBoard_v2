<!doctype html><html lang="ja"><head><meta charset="utf-8"><title>Kogetan SongBoard Control</title><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="./style.css"></head><body class="control-body"><main class="control-panel"><h1>🎤 Kogetan SongBoard v3</h1><label for="nowInput">NOW SINGING</label><input id="nowInput" type="text" placeholder="例：怪獣の花唄"><label for="requestInput">REQUEST（1行に1曲）</label><textarea id="requestInput" placeholder="例：
炎
Lemon
First Love"></textarea><section class="settings-box"><h2>🎨 テーマ</h2><div class="option-row" id="themeButtons"><button type="button" data-theme="pink">💗 Pink</button><button type="button" data-theme="white">🤍 White</button><button type="button" data-theme="yellow">💛 Yellow</button><button type="button" data-theme="sky">🩵 Sky Blue</button></div><h2>📏 サイズ</h2><div class="option-row" id="sizeButtons"><button type="button" data-size="s">小</button><button type="button" data-size="m">中</button><button type="button" data-size="l">大</button></div><label class="toggle-row"><input id="requestOpen" type="checkbox" checked><span>リクエスト受付中</span></label></section><div class="button-row"><button id="saveBtn" class="primary">更新</button><button id="clearNowBtn">曲名クリア</button><button id="clearRequestsBtn">リクエスト全消し</button></div><p id="savedText" class="saved-text"></p><p class="hint">NOW SINGINGはEnter、REQUESTと設定は入力後に自動保存されます。Ctrl + Enterでも更新できます。</p></main><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="./firebase-config.js"></script><script src="./control.js"></script></body></html>
