<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>Kogetan SongBoard Control</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="control-body">
  <main class="control-panel">
    <h1>🎤 Kogetan SongBoard</h1>

    <label>NOW SINGING</label>
    <input id="nowInput" type="text" placeholder="例：怪獣の花唄">

    <label>REQUEST（1行に1曲）</label>
    <textarea id="requestInput" placeholder="例：
炎
Lemon
First Love"></textarea>

    <label class="checkbox-row">
      <input id="requestOpen" type="checkbox" checked>
      リクエスト受付中にする
    </label>

    <div class="button-row">
      <button id="saveBtn" class="primary">更新</button>
      <button id="clearNowBtn">曲名クリア</button>
      <button id="clearRequestsBtn">リクエスト全消し</button>
    </div>

    <p class="hint">Ctrl + Enter でも更新できます。</p>
    <p id="savedText" class="saved-text"></p>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="./firebase-config.js"></script>
  <script src="./control.js"></script>
</body>
</html>
